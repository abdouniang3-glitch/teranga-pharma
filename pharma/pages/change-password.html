<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Changer mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>body{background:linear-gradient(135deg,#042a1a,#0a7a4a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card-p{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.25)}.sb{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:6px}.sf{height:100%;border-radius:3px;transition:all .3s}</style>
</head>
<body>
<div class="card-p">
  <div style="text-align:center;margin-bottom:24px"><div style="width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin:0 auto 12px">🔑</div><h1 style="font-family:'Playfair Display',serif;font-size:20px;color:var(--primary-dark)">Changer mon mot de passe</h1><p style="color:var(--text-muted);font-size:13px" id="wMsg">Définissez votre nouveau mot de passe</p></div>
  <div id="mForm">
    <div class="form-group"><label class="form-label">Mot de passe actuel</label><input type="password" class="form-control" id="op" placeholder="Mot de passe actuel"></div>
    <div class="form-group"><label class="form-label">Nouveau mot de passe</label><input type="password" class="form-control" id="np" oninput="cs()"><div class="sb"><div class="sf" id="sf" style="width:0"></div></div><div style="font-size:11px;margin-top:4px" id="st"></div></div>
    <div class="form-group"><label class="form-label">Confirmer</label><input type="password" class="form-control" id="cp" oninput="cm()"><div style="font-size:11px;margin-top:4px" id="cm"></div></div>
    <div id="err" class="alert alert-danger" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="sub()">✅ Valider</button>
    <div style="text-align:center;margin-top:10px"><a onclick="back()" style="color:var(--text-muted);font-size:12px;cursor:pointer;text-decoration:underline">← Retour sans changer</a></div>
  </div>
  <div id="ok" style="display:none;text-align:center"><div style="font-size:48px;margin-bottom:12px">✅</div><div style="font-size:16px;font-weight:700;color:var(--success);margin-bottom:6px">Mot de passe mis à jour !</div><p style="color:var(--text-muted);font-size:13px">Redirection dans <span id="cd">3</span>s...</p></div>
</div>
<script src="../js/app.js"></script>
<script>
const ROUTES={pharmacien:'pharmacien/dashboard.html',assistant:'assistant/dashboard.html',preparateur:'preparateur/dashboard.html',caissier:'caissier/dashboard.html',resp_stock:'resp-stock/dashboard.html',client:'client/dashboard.html',fournisseur:'fournisseur/dashboard.html'};
const u=Auth.getUser();if(!u){window.location.href='../index.html'}else document.getElementById('wMsg').textContent='Bonjour '+u.nom+', définissez votre nouveau mot de passe';
function cs(){const v=document.getElementById('np').value;let s=0;if(v.length>=4)s++;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;const c=[['transparent',''],[' #dc2626','⚠️ Très faible'],['#f59e0b','🟡 Faible'],['#0891b2','🟠 Moyen'],['#16a34a','🟢 Fort'],['#0a7a4a','💪 Très fort']];const[col,txt]=c[s]||c[0];const f=document.getElementById('sf');f.style.width=(s*20)+'%';f.style.background=col;document.getElementById('st').innerHTML=`<span style="color:${col}">${txt}</span>`}
function cm(){const n=document.getElementById('np').value,c=document.getElementById('cp').value;const m=document.getElementById('cm');if(!c){m.textContent='';return}m.innerHTML=n===c?'<span style="color:var(--success)">✅ OK</span>':'<span style="color:var(--danger)">❌ Ne correspond pas</span>'}
function sub(){const old=document.getElementById('op').value,nw=document.getElementById('np').value,cf=document.getElementById('cp').value,e=document.getElementById('err');if(!old||!nw||!cf){e.textContent='Remplissez tous les champs';e.style.display='flex';return}if(nw.length<4){e.textContent='Minimum 4 caractères';e.style.display='flex';return}if(nw!==cf){e.textContent='Les mots de passe ne correspondent pas';e.style.display='flex';return}const r=AccountManager.changePassword(u.id,old,nw);if(!r.success){e.textContent=r.error;e.style.display='flex';return}e.style.display='none';document.getElementById('mForm').style.display='none';document.getElementById('ok').style.display='block';let n=3;const t=setInterval(()=>{n--;document.getElementById('cd').textContent=n;if(n<=0){clearInterval(t);window.location.href=ROUTES[u.role]||'../index.html'}},1000)}
function back(){window.location.href=ROUTES[u.role]||'../index.html'}
</script>
</body>
</html>
