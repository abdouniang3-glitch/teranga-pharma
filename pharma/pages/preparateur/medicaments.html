<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Catalogue</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">💊 Catalogue médicaments</h1></div>
      <div class="topbar-right"></div>
    </header>
    <main class="page-content">
<div class="card"><div class="card-header"><span class="card-title">Médicaments</span><input class="form-control" id="s" placeholder="🔍 Rechercher..." style="width:200px" oninput="load()"></div><div class="card-body" style="padding:0"><table><thead><tr><th>Nom commercial</th><th>DCI</th><th>Forme</th><th>Dosage</th><th>Stock</th><th>Prix</th><th>Type</th></tr></thead><tbody id="b"></tbody></table></div></div>
    </main>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/wolof.js"></script>
  <script src="../../js/api.js"></script>
<script>
Auth.requireRole('preparateur');
const user = Auth.getUser();
Sidebar.render('sidebar');

function load(){
  const s=document.getElementById('s').value.toLowerCase();
  let meds=DB.get('medicaments');
  if(s) meds=meds.filter(m=>m.nom_commercial.toLowerCase().includes(s)||m.dci.toLowerCase().includes(s));
  document.getElementById('b').innerHTML=meds.map(m=>{const stock=getStockTotal(m.id);return`<tr><td><strong>${m.nom_commercial}</strong></td><td class="text-muted">${m.dci}</td><td>${m.forme||'—'}</td><td>${m.dosage||'—'}</td><td><span class="${stock<=m.seuil_min?'text-danger fw-700':'text-success fw-700'}">${stock}</span></td><td style="font-weight:700;color:var(--primary)">${Fmt.currency(m.prix_vente)}</td><td>${m.sur_ordonnance?'<span class="badge badge-warning">📋 Ord.</span>':'<span class="badge badge-success">🆓 Libre</span>'}</td></tr>`}).join('')||'<tr><td colspan="7" style="text-align:center;padding:14px;color:var(--text-muted)">Aucun résultat</td></tr>';
}
load();

</script>
</body>
</html>
