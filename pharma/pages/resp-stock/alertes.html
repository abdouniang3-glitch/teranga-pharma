<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Alertes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">🔔 Centre d'alertes (Stock)</h1></div>
      <div class="topbar-right"></div>
    </header>
    <main class="page-content">
<div class="alert alert-warning">⚠️ Alertes stock faible (RG10) et péremptions (RG8) générées automatiquement.</div><div class="stats-grid" id="statsGrid" style="grid-template-columns:repeat(3,1fr)"></div><div class="card"><div class="card-header"><span class="card-title">Alertes actives</span><button class="btn btn-outline btn-sm" onclick="markAll()">✅ Tout marquer lu</button></div><div class="card-body" id="list"></div></div>
    </main>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/wolof.js"></script>
  <script src="../../js/api.js"></script>
<script>
Auth.requireRole('resp_stock');
const user = Auth.getUser();
Sidebar.render('sidebar');

function load(){
  const alertes=DB.get('alertes');const actives=alertes.filter(a=>!a.lu);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-icon red">🔔</div><div><div class="stat-label">Alertes actives</div><div class="stat-value">${actives.length}</div></div></div>
    <div class="stat-card"><div class="stat-icon orange">📦</div><div><div class="stat-label">Stock faible</div><div class="stat-value">${actives.filter(a=>a.type==='stock_faible').length}</div></div></div>
    <div class="stat-card"><div class="stat-icon orange">⚠️</div><div><div class="stat-label">Péremptions</div><div class="stat-value">${actives.filter(a=>a.type==='peremption').length}</div></div></div>`;
  const icons={stock_faible:'📦',peremption:'⚠️',credit_retard:'💳'};
  document.getElementById('list').innerHTML=actives.length?actives.map(a=>`<div style="border:1px solid var(--border);border-left:4px solid var(--${a.type==='stock_faible'?'danger':'warning'});border-radius:9px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px"><span style="font-size:20px">${icons[a.type]||'🔔'}</span><div style="flex:1"><div style="font-weight:600;font-size:13px">${a.message}</div></div><button class="btn btn-outline btn-xs" onclick="DB.update('alertes','${a.id}',{lu:true});updateAlerteBadge();load()">✅ Lu</button></div>`).join(''):'<div style="text-align:center;padding:30px;color:var(--success)">✅ Aucune alerte active</div>';
}
function markAll(){const a=DB.get('alertes').map(x=>({...x,lu:true}));DB.set('alertes',a);updateAlerteBadge();Toast.success('Tout marqué lu');load();}
load();

</script>
</body>
</html>
