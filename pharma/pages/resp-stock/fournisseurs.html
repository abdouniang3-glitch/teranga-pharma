<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Fournisseurs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">🏭 Fournisseurs</h1></div>
      <div class="topbar-right"></div>
    </header>
    <main class="page-content">

      <div class="stats-grid" id="statsGrid" style="grid-template-columns:repeat(2,1fr)"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px" id="grid"></div>
    </main>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/wolof.js"></script>
  <script src="../../js/api.js"></script>
<script>
Auth.requireRole('resp_stock','pharmacien');
const user = Auth.getUser();
Sidebar.render('sidebar');

function load(){
  const fours=DB.get('fournisseurs');
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-icon blue">🏭</div><div><div class="stat-label">Fournisseurs</div><div class="stat-value">${fours.length}</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-label">Actifs</div><div class="stat-value">${fours.filter(f=>f.actif).length}</div></div></div>`;
  document.getElementById('grid').innerHTML=fours.map(f=>`<div class="card"><div class="card-body">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div class="avatar-lg" style="background:var(--primary)">🏭</div><div><div style="font-weight:700">${f.raison_sociale}</div><div class="text-xs text-muted">${f.agrement||'—'}</div></div></div>
    <div class="text-sm">📞 ${f.telephone||'—'}</div><div class="text-sm">✉️ ${f.email||'—'}</div><div class="text-sm">📍 ${f.adresse||'—'}</div>
    <div style="margin-top:10px;background:var(--bg);border-radius:7px;padding:8px;font-size:12px">💡 ${f.conditions||'—'}</div>
  </div></div>`).join('');
}
load();

</script>
</body>
</html>
