<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Stocks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">📦 Gestion des stocks</h1></div>
      <div class="topbar-right"></div>
    </header>
    <main class="page-content">

      <div class="stats-grid" id="statsGrid" style="grid-template-columns:repeat(4,1fr)"></div>
      <div class="card"><div class="card-header"><span class="card-title">Stock par médicament</span><input class="form-control" id="s" placeholder="🔍" style="width:180px" oninput="load()"></div><div class="card-body" style="padding:0"><table><thead><tr><th>Médicament</th><th>DCI</th><th>Stock total</th><th>Seuil</th><th>Lot FEFO</th><th>Péremption FEFO</th><th>Statut</th></tr></thead><tbody id="b"></tbody></table></div></div>
    </main>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/wolof.js"></script>
  <script src="../../js/api.js"></script>
<script>
Auth.requireRole('resp_stock','pharmacien');
const user = Auth.getUser();
Sidebar.render('sidebar');

function load(){
  const meds=DB.get('medicaments');const lots=DB.get('lots');
  const s=document.getElementById('s').value.toLowerCase();
  let list=meds; if(s) list=list.filter(m=>m.nom_commercial.toLowerCase().includes(s)||m.dci.toLowerCase().includes(s));
  const stockTotal=lots.filter(l=>l.statut==='actif').reduce((s,l)=>s+l.quantite_disponible,0);
  const nbCrit=meds.filter(m=>getStockTotal(m.id)<=m.seuil_min).length;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-icon blue">📦</div><div><div class="stat-label">Unités totales</div><div class="stat-value">${stockTotal}</div></div></div>
    <div class="stat-card"><div class="stat-icon red">⚠️</div><div><div class="stat-label">Stocks critiques</div><div class="stat-value">${nbCrit}</div></div></div>
    <div class="stat-card"><div class="stat-icon orange">💀</div><div><div class="stat-label">Lots périmés</div><div class="stat-value">${lots.filter(l=>l.statut==='perime').length}</div></div></div>
    <div class="stat-card"><div class="stat-icon green">💊</div><div><div class="stat-label">Médicaments</div><div class="stat-value">${meds.length}</div></div></div>`;
  document.getElementById('b').innerHTML=list.map(m=>{const stock=getStockTotal(m.id);const fefo=getLotFEFO(m.id);const alerte=stock<=m.seuil_min;return`<tr><td><strong>${m.nom_commercial}</strong></td><td class="text-muted text-sm">${m.dci}</td><td><span class="${alerte?'text-danger fw-700':'text-success fw-700'}">${stock}</span></td><td>${m.seuil_min}</td><td style="font-size:11px">${fefo?fefo.numero_lot:'—'}</td><td style="font-size:11px">${fefo?`<span class="${Fmt.joursPeremption(fefo.date_peremption)<=90?'text-danger':''}">${Fmt.date(fefo.date_peremption)}</span>`:'—'}</td><td>${alerte?'<span class="badge badge-danger">⚠️ Critique</span>':'<span class="badge badge-success">✅ OK</span>'}</td></tr>`}).join('');
}
load();

</script>
</body>
</html>
