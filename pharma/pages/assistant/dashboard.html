<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Tableau de bord</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">💊 Espace Assistant</h1></div>
      <div class="topbar-right"></div>
    </header>
    <main class="page-content">

      <div class="hero-banner hero-assistant">
        <div class="hero-left">
          <div class="hero-tag"><span class="dot"></span> Pharmacien Assistant</div>
          <div class="hero-title">Bonjour, <em id="hNom">Assistant</em></div>
          <div class="hero-sub">Ventes, ordonnances et conseil aux patients</div>
          <div class="hero-stats">
            <div class="hero-stat"><div class="v" id="hV">0</div><div class="l">Ventes aujourd'hui</div></div>
            <div class="hero-stat"><div class="v" id="hO">0</div><div class="l">Ordonnances en attente</div></div>
          </div>
        </div>
        <div class="hero-right">
          <svg viewBox="0 0 220 180" width="220" height="180" xmlns="http://www.w3.org/2000/svg">
            <rect x="70" y="60" width="50" height="14" rx="7" fill="rgba(245,158,11,.6)"/>
            <rect x="84" y="46" width="14" height="50" rx="7" fill="rgba(245,158,11,.6)"/>
            <rect x="30" y="120" width="50" height="55" rx="6" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
            <rect x="33" y="123" width="44" height="18" rx="3" fill="rgba(10,122,74,.5)"/>
            <rect x="100" y="110" width="50" height="65" rx="6" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
            <rect x="103" y="113" width="44" height="18" rx="3" fill="rgba(21,101,192,.5)"/>
          </svg>
        </div>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="grid-2">
        <div class="card"><div class="card-header"><span class="card-title">🧾 Mes ventes du jour</span></div><div class="card-body" style="padding:0"><table><thead><tr><th>Réf</th><th>Client</th><th>Montant</th><th>Statut</th></tr></thead><tbody id="vBody"></tbody></table></div></div>
        <div class="card"><div class="card-header"><span class="card-title">📋 Ordonnances en attente</span></div><div class="card-body" id="ordBody"></div></div>
      </div>
    </main>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/wolof.js"></script>
  <script src="../../js/api.js"></script>
<script>
Auth.requireRole('assistant');
const user = Auth.getUser();
Sidebar.render('sidebar');

document.getElementById('hNom').textContent = user.nom.split(' ')[0];
function load(){
  const today=new Date().toISOString().split('T')[0];
  const ventes=DB.get('ventes').filter(v=>v.vendeur_id===user.id&&v.date_vente&&v.date_vente.startsWith(today));
  const ords=DB.get('ordonnances').filter(o=>o.statut==='en_attente');
  const clients=DB.get('clients');
  document.getElementById('hV').textContent=ventes.length;
  document.getElementById('hO').textContent=ords.length;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-icon green">🧾</div><div><div class="stat-label">Ventes aujourd'hui</div><div class="stat-value">${ventes.length}</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">💰</div><div><div class="stat-label">CA mes ventes</div><div class="stat-value">${Fmt.currency(ventes.reduce((s,v)=>s+v.montant_total,0))}</div></div></div>
    <div class="stat-card"><div class="stat-icon orange">📋</div><div><div class="stat-label">Ordonnances en attente</div><div class="stat-value">${ords.length}</div></div></div>
    <div class="stat-card"><div class="stat-icon purple">💊</div><div><div class="stat-label">Médicaments</div><div class="stat-value">${DB.get('medicaments').length}</div></div></div>`;
  document.getElementById('vBody').innerHTML=ventes.slice(-5).reverse().map(v=>{const c=clients.find(x=>x.id===v.client_id);return`<tr><td><code style="font-size:11px">${v.ref_vente}</code></td><td style="font-size:12px">${c?c.prenom+' '+c.nom:'Passage'}</td><td style="font-weight:700;color:var(--primary)">${Fmt.currency(v.montant_total)}</td><td>${Fmt.statutVente(v.statut)}</td></tr>`}).join('')||'<tr><td colspan="4" style="text-align:center;padding:14px;color:var(--text-muted)">Aucune vente</td></tr>';
  document.getElementById('ordBody').innerHTML=ords.length?ords.map(o=>{const c=clients.find(x=>x.id===o.client_id);return`<div style="border:1px solid var(--border);border-left:4px solid var(--warning);border-radius:8px;padding:10px;margin-bottom:8px"><div style="font-weight:600;font-size:13px">${o.ref_ordonnance}</div><div class="text-sm text-muted">${c?c.prenom+' '+c.nom:'?'} · Dr ${o.medecin_nom||'?'}</div></div>`}).join(''):'<p class="text-muted text-sm text-center" style="padding:16px">✅ Aucune ordonnance en attente</p>';
}
load();

</script>
</body>
</html>
