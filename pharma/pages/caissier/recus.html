<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERANGA PHARMA — Reçus & Factures</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">🧾 Reçus & Factures</h1></div>
      <div class="topbar-right"></div>
    </header>
    <main class="page-content">

      <div class="card"><div class="card-header"><span class="card-title">Historique des reçus</span><input type="date" class="form-control" id="fd" style="width:160px" onchange="load()"></div><div class="card-body" style="padding:0"><table><thead><tr><th>Réf</th><th>Date</th><th>Client</th><th>Montant</th><th>Mode</th><th>Ord.</th><th></th></tr></thead><tbody id="b"></tbody></table></div></div>
    </main>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/wolof.js"></script>
  <script src="../../js/api.js"></script>
<script>
Auth.requireRole('caissier');
const user = Auth.getUser();
Sidebar.render('sidebar');

function load(){
  let ventes=DB.get('ventes').slice().reverse();
  const fd=document.getElementById('fd').value;
  if(fd) ventes=ventes.filter(v=>v.date_vente&&v.date_vente.startsWith(fd));
  const clients=DB.get('clients');
  const mIcon={especes:'💵',wave:'📱 Wave',orange_money:'📱 OM',credit:'💳'};
  document.getElementById('b').innerHTML=ventes.map(v=>{const c=clients.find(x=>x.id===v.client_id);return`<tr>
    <td><code style="font-size:11px">${v.ref_vente}</code></td>
    <td style="font-size:12px">${Fmt.dateTime(v.date_vente)}</td>
    <td style="font-size:12px">${c?c.prenom+' '+c.nom:'Passage'}</td>
    <td style="font-weight:700;color:var(--primary)">${Fmt.currency(v.montant_total)}</td>
    <td style="font-size:12px">${mIcon[v.mode_paiement]||v.mode_paiement}</td>
    <td>${v.ordonnance_id?'<span class="badge badge-warning">📋 Oui</span>':'—'}</td>
    <td>${Fmt.statutVente(v.statut)}</td>
  </tr>`}).join('')||'<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--text-muted)">Aucune vente</td></tr>';
}
load();

</script>
  <script src="../../js/sms.js"></script>
</body>
</html>
